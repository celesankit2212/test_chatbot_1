 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Test Automation Bot</title>
</head>
<body>
    <h2>Enter Test Case Description</h2>
    <form method="post">
        <textarea name="test_description" rows="4" cols="50" placeholder="Describe your test case..."></textarea><br>
        <button type="submit">Generate & Run Test</button>
    </form>
    <h3>Generated Script:</h3>
    <pre>{{ script }}</pre>
    <h3>Test Execution Result:</h3>
    <pre>{{ test_result }}</pre>
</body>
</html>
